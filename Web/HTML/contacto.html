    <div class="container">
        <h1>CONTACTO</h1>
        <p>¿Tienes alguna duda, has encontrado un bug en el juego o quieres proponer una mejora? Déjanos un mensaje a
            continuación.</p>

        <form class="formulario" action="mailto:4400191@alu.murciaeduca.es" method="POST" enctype="text/plain">

            <label for="nombre">NOMBRE JUGADOR</label>
            <input type="text" id="nombre" name="Nombre" required placeholder="Paquito123">

            <label for="email">CORREO ELECTRÓNICO</label>
            <input type="email" id="email" name="Email" required placeholder="tu@correo.com">

            <label for="mensaje">TU MENSAJE</label>
            <textarea id="mensaje" name="Mensaje" rows="6" required placeholder="Escribe aquí tu mensaje..."></textarea>

            <button type="submit" class="btn" style="margin-top: 10px; width: 100%;">ENVIAR MENSAJE</button>

        </form>

    </div>

</body>
